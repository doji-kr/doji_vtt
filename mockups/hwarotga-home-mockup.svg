  <text x="32" y="580" font-size="12.5"><tspan fill="#E8A13D">①  </tspan><tspan fill="#C9B896">한 계정, 두 얼굴 — 플레이어 수첩과 DM의 서재</tspan></text>
  <text x="428" y="580" font-size="12.5"><tspan fill="#E8A13D">②  </tspan><tspan fill="#C9B896">이어서 하기 — 읽던 페이지에 꽂아둔 책갈피</tspan></text>
  <text x="32" y="606" font-size="12.5"><tspan fill="#E8A13D">③  </tspan><tspan fill="#C9B896">라이브 = 타오르는 불꽃 배지와 남은 좌석</tspan></text>
  <text x="428" y="606" font-size="12.5"><tspan fill="#E8A13D">④  </tspan><tspan fill="#C9B896">포스터에 머무르면 표지가 펼쳐진다 (호버)</tspan></text>
  <text x="32" y="632" font-size="12.5"><tspan fill="#E8A13D">⑤  </tspan><tspan fill="#C9B896">난이도는 주사위 개수, 예상 시간 함께 표기</tspan></text>
  <text x="428" y="632" font-size="12.5"><tspan fill="#E8A13D">⑥  </tspan><tspan fill="#C9B896">'+ 스튜디오' — 시나리오·캠페인 제작 모드 입구</tspan></text>
</svg>
